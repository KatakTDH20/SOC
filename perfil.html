<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil - SOC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* CONTENIDO */
.container {
    flex: 1;
    padding: 40px;
    text-align: center;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

.card p {
    margin: 10px 0;
}

/* BOTONES */
button {
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
}

.aprobar { background: green; color: white; }
.rechazar { background: red; color: white; }
.logout { background: red; color: white; }
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo-container">
        <a href="index.html">
            <img src="img/logo.png">
            <h1>Segunda Oportunidad Canina</h1>
        </a>
    </div>

    <div class="menu-toggle" id="menu-toggle">☰</div>

    <nav class="nav" id="nav">
        <a href="index.html">Inicio</a>
        <a href="perros.html">Perros</a>

        <!-- dinámico -->
        <a href="admin.html" id="admin-profile-link" style="display:none;">Admin</a>
        <a href="lista.html" id="admin-list-link" style="display:none;">Usuarios</a>
    </nav>
</header>

<!-- CONTENIDO -->
<div class="container">
    <div class="card">
        <h2>Perfil</h2>

        <p><strong>Nombre:</strong> <span id="nombre"></span></p>
        <p><strong>Correo:</strong> <span id="correo"></span></p>
        <p><strong>Teléfono:</strong> <span id="telefono"></span></p>

        <hr>

        <h3>Solicitud de adopción</h3>
        <p id="adopcion-info">Sin solicitud</p>

        <!-- BOTONES ADMIN -->
        <div id="admin-botones" style="display:none;">
            <button class="aprobar" onclick="aprobar()">Aprobar</button>
            <button class="rechazar" onclick="rechazar()">Rechazar</button>
        </div>

        <!-- BOTÓN LOGOUT SOLO USUARIO -->
        <button id="logout-btn" class="logout" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
</div>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-content">
        <div>
            <p>📍 Sahuayo, Michoacán</p>
            <p>📞 353 000 0000</p>
            <p>✉ contacto@segundaoportunidadcanina.mx</p>
        </div>

        <div class="social-icons">
            <a href="https://www.instagram.com/segundaoportunidadcanina/">
                <img src="img/instagram.png">
            </a>
            <a href="https://www.tiktok.com/@soc.sahuayo">
                <img src="img/tiktok.png">
            </a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    cargarPerfil();
    cargarAdopcionUsuario();

    // ocultar cerrar sesión si es admin
    if (localStorage.getItem("rol") === "admin") {
        document.getElementById("logout-btn").style.display = "none";
    }
});
</script>

</body>
</html>
